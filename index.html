<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌱 자라다 (Jarada)</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="theme.js"></script>
</head>

<body class="bg-beige font-sans text-slate-800 min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-md text-center">

  <div class="text-6xl mb-4">🌱</div>
  <h1 class="text-3xl font-extrabold tracking-tight">자라다 <span class="text-slate-300 font-medium">Jarada</span></h1>
  <p class="text-sm text-slate-400 mt-2 mb-10">오늘의 약속을 지키면, 나의 나무가 자라나요</p>

  <div class="grid grid-cols-2 gap-4">
    <a href="login.html"
       class="bg-white border border-slate-200 rounded-3xl p-7 shadow-sm
              hover:border-mint hover:shadow-md active:scale-95 transition">
      <div class="text-5xl mb-3">🧒</div>
      <div class="font-extrabold">학생용</div>
      <div class="text-xs text-slate-400 mt-1">이름을 입력하고<br>내 캐릭터를 키워요</div>
    </a>

    <a href="parent.html"
       class="bg-white border border-slate-200 rounded-3xl p-7 shadow-sm
              hover:border-mint hover:shadow-md active:scale-95 transition">
      <div class="text-5xl mb-3">👨‍👩‍👧</div>
      <div class="font-extrabold">선생님/학부모용</div>
      <div class="text-xs text-slate-400 mt-1">전체 현황을 보고<br>칭찬을 보내요</div>
    </a>
  </div>

  <p class="text-xs text-slate-300 mt-10 leading-relaxed">
    학생과 선생님이 <b>서로 다른 기기</b>에 있어도<br>
    보낸 하트와 메시지가 실시간으로 전달됩니다
  </p>

</div>

</body>
</html>
