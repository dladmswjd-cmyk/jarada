<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌱 자라다 — 로그인</title>
<meta name="description" content="이름을 입력하면 나만의 정원이 열려요.">

<!-- 파비콘 -->
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<meta name="theme-color" content="#1ABC9C">

<!-- 오픈그래프 (자세한 설명은 index.html 참고) -->
<meta property="og:type"        content="website">
<meta property="og:site_name"   content="자라다 (Jarada)">
<meta property="og:title"       content="🌱 자라다 — 이름을 입력하면 나만의 정원이 열려요">
<meta property="og:description" content="달력에 할 일을 적고 지킬 때마다 하트를 모아요. 🥚 알에서 🌳 나무까지 캐릭터가 자라납니다.">
<meta property="og:url"         content="https://jarada-phi.vercel.app/login.html">
<meta property="og:image"       content="https://jarada-phi.vercel.app/og-image.png">
<meta property="og:image:width"  content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale"      content="ko_KR">
<meta name="twitter:card"       content="summary_large_image">
<meta name="twitter:image"      content="https://jarada-phi.vercel.app/og-image.png">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="theme.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="db.js"></script>
</head>

<body class="bg-beige font-sans text-slate-800 min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-md">

  <div class="text-center mb-8">
    <div class="text-6xl mb-3">🌱</div>
    <h1 class="text-2xl font-extrabold tracking-tight">자라다에 오신 걸 환영해요</h1>
    <p class="text-sm text-slate-400 mt-2">이름을 입력하면 나만의 정원이 열려요</p>
  </div>

  <div id="setup-slot"></div>

  <div id="login-box" class="bg-white border border-slate-200 rounded-3xl p-7 shadow-sm">

    <label class="block text-sm font-bold mb-2">내 이름</label>
    <input id="name-input" type="text" maxlength="12" placeholder="예) 김민준"
           onkeydown="if(event.key==='Enter') doLogin()"
           class="w-full border border-slate-200 rounded-2xl px-4 py-3.5 text-base
                  focus:outline-none focus:border-mint focus:ring-2 focus:ring-mint/20">

    <!-- 동명이인이 있을 때만 쓰는 칸. 나머지 학생은 비워두면 됩니다. -->
    <label class="block text-sm font-bold mt-4 mb-2">
      번호 <span class="font-medium text-slate-400">(같은 이름의 친구가 있을 때만)</span>
    </label>
    <input id="num-input" type="number" min="1" max="99" placeholder="예) 7 — 없으면 비워두세요"
           onkeydown="if(event.key==='Enter') doLogin()"
           class="w-full border border-slate-200 rounded-2xl px-4 py-3.5 text-base
                  focus:outline-none focus:border-mint focus:ring-2 focus:ring-mint/20">

    <p id="err" class="hidden text-xs text-pink mt-2 font-bold"></p>

    <button onclick="doLogin()"
            class="w-full mt-4 bg-mint hover:bg-mintDk active:scale-[0.98] text-white font-bold
                   rounded-2xl py-3.5 transition shadow-sm">
      시작하기
    </button>

    <!-- 이미 등록된 학생 목록 — 이름을 다시 치지 않아도 되게 -->
    <div id="known" class="hidden mt-7">
      <hr class="border-slate-100 mb-5">
      <div class="text-xs font-bold text-slate-400 mb-3">
        이미 등록된 친구예요? 눌러서 바로 들어가요
      </div>
      <div id="known-list" class="flex flex-wrap gap-2"></div>
    </div>
  </div>

  <p class="text-center text-xs text-slate-300 mt-6 leading-relaxed">
    선생님/학부모이신가요? <a href="parent.html" class="text-mint font-bold hover:underline">여기로 들어가세요</a>
  </p>

</div>

<script>
// 이미 로그인해 둔 기기라면 곧장 학생 앱으로 보냅니다
if (getCurrentUser()) location.href = 'student.html';

let knownStudents = {};   // { "김민준-7": {name, num, ...}, ... }

const ok = initDb();

if (!ok) {
  // firebase-config.js 를 아직 안 채웠을 때
  document.getElementById('login-box').classList.add('hidden');
  showSetupNeeded('setup-slot');
} else {
  // 등록된 학생 목록을 한 번만 읽어와 버튼으로 보여줍니다
  // ROOT 는 db.js 에 정의돼 있습니다 (경로를 두 곳에 적지 않기 위해)
  db.ref(`${ROOT}/students`).once('value').then(snap => {
    knownStudents = snap.val() || {};
    const ids = Object.keys(knownStudents);
    if (!ids.length) return;

    document.getElementById('known').classList.remove('hidden');
    document.getElementById('known-list').innerHTML = ids.map(id => `
      <button onclick="quickLogin('${id.replace(/'/g, "\\'")}')"
              class="text-sm bg-slate-100 hover:bg-mint hover:text-white rounded-full px-4 py-2 transition">
        ${escapeText(displayName(knownStudents[id]) || id)}
      </button>`).join('');
  }).catch(e => console.warn('학생 목록을 읽지 못했습니다.', e));
}

function escapeText(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function showErr(msg) {
  const err = document.getElementById('err');
  err.textContent = msg;
  err.classList.remove('hidden');
}

function doLogin() {
  const name = document.getElementById('name-input').value.trim();
  const numRaw = document.getElementById('num-input').value.trim();
  const num = numRaw ? parseInt(numRaw, 10) : null;

  if (name.length < 1) {
    showErr('이름을 입력해 주세요.');
    return;
  }
  // Firebase 열쇠로 쓸 수 없는 글자
  if (/[.#$\[\]\/]/.test(name)) {
    showErr('이름에 . # $ [ ] / 는 쓸 수 없어요.');
    return;
  }
  if (numRaw && (isNaN(num) || num < 1 || num > 99)) {
    showErr('번호는 1~99 사이로 넣어주세요.');
    return;
  }

  const id = makeStudentId(name, num);

  // ⚠️ 동명이인 방지 — 이미 있는 이름이면 본인이 맞는지 한 번 물어봅니다.
  //    비밀번호가 없으므로 이게 우리가 할 수 있는 최선의 확인입니다.
  if (knownStudents[id]) {
    const label = displayName(knownStudents[id]);
    const mine = confirm(
      `이미 등록된 '${label}' 이(가) 있어요.\n\n` +
      `· 본인이 맞다면  → [확인] 을 눌러 이어서 하세요\n` +
      `· 다른 사람이라면 → [취소] 를 누르고 번호를 넣어주세요`
    );
    if (!mine) {
      document.getElementById('num-input').focus();
      showErr('같은 이름의 친구와 겹쳐요. 번호를 넣어 구분해 주세요.');
      return;
    }
  }

  setCurrentUser(name, num);
  location.href = 'student.html';
}

function quickLogin(id) {
  const d = knownStudents[id];
  if (!d) return;
  setCurrentUser(d.name, d.num);
  location.href = 'student.html';
}
</script>
</body>
</html>
