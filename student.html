<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌱 자라다 — 학생용</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="theme.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="db.js"></script>
</head>

<body class="bg-beige font-sans text-slate-800 min-h-screen">

<!-- ══════════ 헤더 ══════════ -->
<header class="max-w-lg mx-auto px-6 pt-7 pb-5 flex items-center justify-between">
  <div>
    <h1 class="text-2xl font-extrabold tracking-tight">🌱 자라다</h1>
    <p class="text-sm text-slate-400 mt-0.5">
      <b id="login-name" class="text-mint"></b> 님, 오늘도 자라볼까요?
    </p>
  </div>
  <div class="flex items-center gap-2">
    <button id="sound-btn" onclick="toggleSound()"
            class="text-sm bg-white border border-slate-200 rounded-full px-4 py-2 shadow-sm hover:border-mint transition">
      🔊 소리 켬
    </button>
    <button onclick="logout()"
            class="text-sm bg-white border border-slate-200 rounded-full px-4 py-2 shadow-sm hover:border-pink hover:text-pink transition">
      로그아웃
    </button>
  </div>
</header>

<!-- ══════════ 본문: 폰 뷰 하나뿐입니다 (제어판 없음) ══════════ -->
<main class="max-w-lg mx-auto px-6 pb-14 flex flex-col items-center">
  <div id="phone-mount"></div>
</main>

<!-- ⚠️ app.js 는 DOM 이 만들어진 뒤에 실행돼야 하므로 반드시 body 맨 끝에 둡니다 -->
<script src="app.js"></script>
<script>
  initStudentApp();
</script>
</body>
</html>
